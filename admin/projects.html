<!-- FORM -->
<form id="projectForm" class="project-form">

<input
type="text"
id="heroTitle"

<textarea

required>
</textarea>

<div class="btn-fields">

<input
type="text"

</div>

<input
type="text"
id="title"
placeholder="Project Company Name"

<textarea
id="description"

required>
</textarea>

<button type="submit">

</button>

</form>
