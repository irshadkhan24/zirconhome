<div class="main interior-page">
<div class="container">

 <div class="pageHeader">

        <i class="fa-solid fa-couch"></i>

    </h1>

        Handle interior design and work details with images and descriptions.
    </p>

</div>
  <form id="interiorForm">
    <input
  type="text"
  id="mainHeading"
  placeholder="Main Heading"
  required
>

<textarea
  id="mainDescription"
  placeholder="Main Description"
  required
></textarea>

    <input
      type="text"
      id="sectionTitle"
      placeholder="Section Title"
      required
    >

    <textarea
      id="purpose"
      placeholder="Purpose"
      required
    ></textarea>

    <textarea
      id="materialUsed"
      placeholder="Material Used"
      required
    ></textarea>

    <textarea
      id="advantages"
      placeholder="Advantages"
      required
    ></textarea>

    <div class="uploadTop">

  <input
    type="file"
    id="images"
    multiple
  >

  <button
    type="button"
    id="addMoreBtn"
  >
    +
  </button>

</div>

<div id="imageDetailsContainer"></div>

    <button type="submit">
      Save
    </button>

  </form>

 <div class="previewDivider">
    <span>
        <i class="fa-solid fa-list"></i>

    </span>
</div>
